services:
  nginx:
    container_name: nginx
    image: nginx
    volumes:
      - ../wordpress/:/usr/share/nginx/html/
      - ./etc/nginx/conf.d:/etc/nginx/conf.d
      - ./etc/nginx/nginx.conf:/etc/nginx/nginx.conf       
    tty: true
    ports:
     - "80:80"    
    links:
      - php
    networks:
      workgroup:
        ipv4_address: "10.5.0.2"
        
  php:
    container_name: php
    image: myridia/php8.4fpm
    volumes:
      - ../wordpress/:/usr/share/nginx/html/
    networks:
      workgroup:
        ipv4_address: "10.5.0.3"
      
  db:
    image: mariadb    
    container_name: db
    volumes:
      - db:/var/lib/mysql
      - "./init/:/docker-entrypoint-initdb.d"    
    ports:
     - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: passpass
      MYSQL_USER: dbsql1
      MYSQL_PASSWORD: passpass
      MYSQL_DATABASE: dbsql1
    networks:
      workgroup:
        ipv4_address: "10.5.0.4"

  wpcli:
    image: wordpress:cli    
    container_name: wpcli
    command: >
      /bin/sh -c  '
      sleep 3;
      tail -F anything '
    user: root 
    links:
      - db:mysql

    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: dbsql1
      WORDPRESS_DB_PASSWORD: passpass
      WORDPRESS_DB_NAME: dbsql1
      memory: 3g
    volumes:
      - ../wordpress:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/php.ini      
    networks:
      workgroup:
        ipv4_address: "10.5.0.5"      
      
  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin
    ports:
      - "81:80"    
    environment:
      PMA_HOST: db 
      PMA_USER: dpsql1
      PMA_PASSWORD: passpass
    networks:      
      workgroup:
        ipv4_address: "10.5.0.6"        
volumes:
  wordpress:
  db:
    
networks:
  workgroup:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16
          gateway: 10.5.0.1
